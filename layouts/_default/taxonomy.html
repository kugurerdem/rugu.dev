<html>
    {{ partial "head.html" . }}
    <body>
        {{ partial "nav.html" . }}
        {{ partial "header.html" . }}
        <main>
            <div class="master-container">
                <article>
                    <div class="page">
                        <h1>
                            {{ if eq .Data.Plural "series" }}
                                {{ .Title }}
                            {{ else }}
                                {{ .Title }} Posts
                            {{ end }}
                        </h1>
                        {{ partial "blog-entry-list.html" .Pages }}
                    </div>
                </article>
            </div>
        </main>
        {{ partial "footer.html" . }}
    </body>
</html>
